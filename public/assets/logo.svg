  </defs>
  <rect x="10" y="10" width="200" height="200" rx="44" fill="url(#bg)"/>
  <path d="M61 74h16l10 56h69l10-44H85" fill="none" stroke="url(#cart)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="102" cy="154" r="10" fill="#f8fafc"/>
